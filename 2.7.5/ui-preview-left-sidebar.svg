<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f151a"/>
      <stop offset="100%" stop-color="#111b22"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101922"/>
      <stop offset="100%" stop-color="#0d1318"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1015"/>
      <stop offset="100%" stop-color="#151f27"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 30px/1.2 'Segoe UI', Arial, sans-serif; fill: #f2f7fb; }
      .subtitle { font: 600 14px/1.4 'Segoe UI', Arial, sans-serif; fill: #c9d7e3; }
      .section { font: 800 15px/1.2 'Segoe UI', Arial, sans-serif; fill: #e7f1f8; letter-spacing: 0.3px; }
      .label { font: 600 12px/1.2 'Segoe UI', Arial, sans-serif; fill: #b9c9d8; }
      .value { font: 600 12px/1.2 'Segoe UI', Arial, sans-serif; fill: #eaf2f8; }
      .btnText { font: 700 12px/1.2 'Segoe UI', Arial, sans-serif; fill: #e1ebf2; }
      .btnPrimaryText { font: 800 12px/1.2 'Segoe UI', Arial, sans-serif; fill: #10202b; }
      .small { font: 600 11px/1.2 'Segoe UI', Arial, sans-serif; fill: #a6bacb; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="26" y="20" width="1548" height="118" rx="16" fill="#0d141b" stroke="#2c4558" filter="url(#shadow)"/>
  <rect x="50" y="44" width="130" height="34" rx="10" fill="#b88a1b"/>
  <text x="115" y="66" text-anchor="middle" class="btnPrimaryText">Open Map</text>
  <rect x="192" y="44" width="94" height="34" rx="10" fill="#1a2a36" stroke="#3f5f76"/>
  <text x="239" y="66" text-anchor="middle" class="btnText">Undo Fog</text>
  <rect x="298" y="44" width="92" height="34" rx="10" fill="#1a2a36" stroke="#3f5f76"/>
  <text x="344" y="66" text-anchor="middle" class="btnText">Redo Fog</text>
  <rect x="402" y="44" width="98" height="34" rx="10" fill="#3a1f23" stroke="#a44f58"/>
  <text x="451" y="66" text-anchor="middle" class="btnText">Reset Fog</text>
  <rect x="512" y="44" width="96" height="34" rx="10" fill="#21303b" stroke="#3f5f76"/>
  <text x="560" y="66" text-anchor="middle" class="btnText">Fog : Off</text>

  <text x="652" y="66" class="label">Target screen</text>
  <rect x="748" y="42" width="130" height="38" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="763" y="66" class="value">Screen 1</text>

  <text x="906" y="66" class="label">Player mode</text>
  <rect x="1000" y="42" width="138" height="38" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="1016" y="66" class="value">Fullscreen</text>

  <rect x="1160" y="42" width="128" height="34" rx="10" fill="#16232e" stroke="#3f5f76"/>
  <text x="1224" y="66" text-anchor="middle" class="btnText">Player Screen</text>
  <rect x="1298" y="42" width="112" height="34" rx="10" fill="#a4384b" stroke="#ce5c71"/>
  <text x="1354" y="66" text-anchor="middle" class="btnText">Donate ❤</text>

  <!-- Left sidebar -->
  <rect x="26" y="154" width="278" height="800" rx="16" fill="url(#panel)" stroke="#2d4558" filter="url(#shadow)"/>
  <text x="52" y="188" class="section">Grid &amp; Calibrate</text>

  <rect x="48" y="206" width="232" height="34" rx="10" fill="#16232e" stroke="#3f5f76"/>
  <text x="64" y="228" class="btnText">Grid</text>

  <text x="52" y="266" class="label">Type</text>
  <rect x="110" y="248" width="170" height="34" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="126" y="270" class="value">Square</text>

  <text x="52" y="310" class="label">Grid cell size (px on map)</text>
  <rect x="110" y="292" width="84" height="34" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="131" y="314" class="value">70</text>
  <rect x="48" y="338" width="232" height="10" rx="5" fill="#1b2d3a" stroke="#324d61"/>
  <rect x="48" y="338" width="126" height="10" rx="5" fill="#d2a543"/>

  <text x="52" y="378" class="label">Grid alpha</text>
  <rect x="110" y="360" width="170" height="10" rx="5" fill="#1b2d3a" stroke="#324d61"/>
  <rect x="110" y="360" width="120" height="10" rx="5" fill="#5a809e"/>
  <rect x="48" y="404" width="232" height="34" rx="10" fill="#16232e" stroke="#3f5f76"/>
  <text x="64" y="426" class="btnText">Show on Player</text>
  <rect x="48" y="448" width="232" height="34" rx="10" fill="#1a2a36" stroke="#3f5f76"/>
  <text x="122" y="470" text-anchor="middle" class="btnText">Calibrate</text>

  <line x1="46" y1="512" x2="260" y2="512" stroke="#2d4558" stroke-width="1"/>

  <text x="52" y="546" class="section">Annotate</text>
  <rect x="48" y="564" width="232" height="34" rx="10" fill="#16232e" stroke="#3f5f76"/>
  <text x="64" y="586" class="btnText">Annotate</text>
  <rect x="48" y="608" width="232" height="34" rx="10" fill="#16232e" stroke="#3f5f76"/>
  <text x="64" y="630" class="btnText">Snap</text>
  <text x="52" y="674" class="label">Color</text>
  <rect x="110" y="656" width="84" height="34" rx="10" fill="#b1454f"/>
  <text x="152" y="678" text-anchor="middle" class="btnText">Color</text>
  <text x="52" y="718" class="label">Width</text>
  <rect x="110" y="700" width="84" height="34" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="154" y="722" text-anchor="middle" class="value">6</text>
  <text x="52" y="762" class="label">Style</text>
  <rect x="110" y="744" width="170" height="34" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="126" y="766" class="value">Solid</text>
  <text x="52" y="806" class="label">Alpha</text>
  <rect x="110" y="788" width="170" height="10" rx="5" fill="#1b2d3a" stroke="#324d61"/>
  <rect x="110" y="788" width="146" height="10" rx="5" fill="#d2a543"/>
  <rect x="48" y="824" width="232" height="34" rx="10" fill="#3a1f23" stroke="#a44f58"/>
  <text x="114" y="846" text-anchor="middle" class="btnText">Delete annotation</text>

  <line x1="46" y1="878" x2="260" y2="878" stroke="#2d4558" stroke-width="1"/>

  <text x="52" y="912" class="section">Player</text>
  <rect x="48" y="930" width="232" height="34" rx="10" fill="#1a2a36" stroke="#3f5f76"/>
  <text x="82" y="952" class="btnText">Calibrate 10"</text>
  <text x="188" y="952" class="small">ppi: 120.00</text>

  <!-- Canvas area -->
  <rect x="324" y="154" width="1250" height="800" rx="16" fill="url(#canvas)" stroke="#2c4558" filter="url(#shadow)"/>
  <rect x="360" y="192" width="1178" height="724" rx="14" fill="#0f151b" stroke="#223546"/>
  <text x="949" y="550" text-anchor="middle" class="title">Map / Video canvas</text>
  <text x="949" y="580" text-anchor="middle" class="subtitle">The left sidebar is now narrower, sectioned, and separated by horizontal rules.</text>

  <!-- Small inset highlighting the changed field -->
  <rect x="1094" y="234" width="410" height="120" rx="16" fill="#0d141b" stroke="#2c4558"/>
  <text x="1118" y="263" class="section">Grid cell label</text>
  <text x="1118" y="291" class="label">Grid cell size (px on map)</text>
  <rect x="1270" y="272" width="84" height="34" rx="10" fill="#14222d" stroke="#365367"/>
  <text x="1312" y="294" text-anchor="middle" class="value">70</text>
  <text x="1118" y="324" class="small">The label now sits beside the value field.</text>
</svg>
